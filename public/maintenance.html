<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainbow Chat - Bakımdayız</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        --text: #f9fafb;
        --muted: #9ca3af;
        --panel: rgba(15, 23, 42, 0.92);
        --border: rgba(148, 163, 184, 0.35);
        --shadow: 0 22px 45px rgba(15, 23, 42, 0.85);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 0% 0%, rgba(236, 72, 153, 0.4), transparent 60%),
          radial-gradient(circle at 100% 0%, rgba(56, 189, 248, 0.3), transparent 55%),
          radial-gradient(circle at 0% 100%, rgba(129, 140, 248, 0.35), transparent 55%);
        z-index: -1;
      }
      .card {
        width: min(820px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 22px 18px 18px;
        backdrop-filter: blur(18px);
      }
      .header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }
      .badge {
        width: 44px;
        height: 44px;
        border-radius: 16px;
        background: conic-gradient(
          from 180deg,
          #f97316,
          #facc15,
          #22c55e,
          #06b6d4,
          #6366f1,
          #ec4899,
          #f97316
        );
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #020617;
        font-weight: 800;
        letter-spacing: 0.08em;
        font-size: 13px;
        box-shadow: 0 12px 30px rgba(30, 64, 175, 0.7);
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }
      a,
      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        background: linear-gradient(
          135deg,
          #f97316,
          #facc15,
          #22c55e,
          #06b6d4,
          #6366f1,
          #ec4899
        );
        background-size: 250% 250%;
        color: #020617;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 14px 30px rgba(30, 64, 175, 0.7);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.12s ease, box-shadow 0.12s ease,
          background-position 0.2s ease;
      }
      a:hover,
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 40px rgba(30, 64, 175, 0.8);
        background-position: 80% 0;
      }
      .secondary {
        background: rgba(15, 23, 42, 0.9);
        color: var(--text);
        border: 1px solid rgba(148, 163, 184, 0.55);
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="card">
      <div class="header">
        <span class="badge">RC</span>
        <div>
          <h1>Bakımdayız</h1>
          <p>
            Rainbow Chat şu an güncelleniyor. Birazdan tekrar deneyebilirsin.
          </p>
        </div>
      </div>
      <div class="actions">
        <button onclick="location.reload()">Tekrar dene</button>
        <a class="secondary" href="/">Ana sayfa</a>
      </div>
    </div>
  </body>
</html>
